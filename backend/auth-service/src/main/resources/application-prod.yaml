server:
  port: 8080
logging:
  level:
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
spring:
  messages:
    basename: messages/apiResponseMessage
    encoding: UTF-8
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  config:
    import: optional:classpath:application-kafka.yaml
  kafka:
    consumer:
      group-id: auth-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://auth-service:8080/api/auth/v1/.well-known/jwks.json
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/api/auth/v1/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            scope:
              - name
              - email
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: http://auth-service:8080/api/auth/v1/login/oauth2/code/naver
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            redirect-uri: http://auth-service:8080/login/oauth2/code/kakao
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
            client-name: Kakao
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
security:
  cookie:
    refresh-name: refresh_token
    refresh-path: /auth/refresh
    secure: true
    same-site: Lax
    domain: ""         # 필요 시 설정 (예: .mockio.com)


services:
  user:
    base-url: http://core-service:8080
    connect-timeout-ms: 2000
    read-timeout-ms: 3000

internal:
  auth:
    token: ${INTERNAL_AUTH_TOKEN}

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-expire-time: 1800000
  refresh-token-expire-time: 604800000
  private-key-path: /keys/private_key.pem
  public-key-path: /keys/public_key.pem

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health
  metrics:
    tags:
      application: ${spring.application.name}

