server:
  port: 9080

spring:
  messages:
    basename: messages/apiResponseMessage
    encoding: UTF-8
  profiles:
    active: local
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/${AUTH_DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  config:
    import: classpath:application-kafka.yaml

services:
  interview:
    base-url: http://localhost:9081
    connect-timeout-ms: 2000
    read-timeout-ms: 3000