server:
  port: 8080
logging:
  level:
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off

spring:
  messages:
    basename: messages/apiResponseMessage
    encoding: UTF-8
  application:
    name: core-service
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  config:
    import: optional:classpath:application-kafka.yaml
  kafka:
    consumer:
      group-id: core-service
  ai:
    openai:
      api-key: ${OPEN_AI_KEY}
      model: gpt-4o-mini
      connection-timeout: 5s
      read-timeout: 15s
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://auth-service:8080/api/auth/v1/.well-known/jwks.json
  mail:
    host: smtp.gmail.com
    port: 587
    username: mockioadmin@gmail.com
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
services:
  core:
    base-url: http://core-service:8080
  support:
    base-url: http://support-service:8080


http:
  connect-timeout: 2000
  read-timeout: 3000

internal:
  core:
    token: ${INTERNAL_CORE_TOKEN}

recaptcha:
  secret: ${RECAPTCHA_SECRET}

ai:
  generator: openai
  prompt-version: v1

resilience4j:
  timelimiter:
    instances:
      openaiChat:
        timeout-duration: 15s
      openaiSummaryChat:
        timeout-duration: 15s
      openaiFollowUpChat:
        timeout-duration: 15s
      openaiFeedbackChat:
        timeout-duration: 15s

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health
  metrics:
    tags:
      application: ${spring.application.name}