server:
  port: 9000

spring:
  profiles:
    active: local
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:9080
          predicates:
            - Path=/api/auth/v1/**
        - id: core-service
          uri: http://localhost:9081
          predicates:
            - Path=/api/users/v1/**,/api/interview/v1/**,/api/feedback/v1/**
        - id: support-service
          uri: http://localhost:9082
          predicates:
            - Path=
            - Path=/api/notice/v1/**,/api/faq/v1/**,/api/file/v1/**,/api/notification/v1/**,


